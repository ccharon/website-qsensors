name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install minification tools
        run: sudo npm install -g uglifycss
#        run: sudo npm install -g uglify-js uglifycss

#      - name: Minify JS
#        run: uglifyjs site.js -o site.js -c -m

      - name: Minify CSS
        run: uglifycss style.css > style.css.tmp && mv style.css.tmp style.css

      - name: Prepare dist directory
        run: |
          mkdir dist
          cp index.html style.css favicon.png qsensors.png qsensors-demo.webm robots.txt sitemap.xml dist/

      - name: Push to dist branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          SHA=$(git rev-parse --short HEAD)
          git checkout --orphan dist-new
          git rm -rf . --cached
          git add index.html style.css favicon.png qsensors.png qsensors-demo.webm robots.txt sitemap.xml
          git commit -m "dist: build from $SHA"
          git push origin HEAD:dist --force

      - name: Trigger webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          TIMESTAMP=$(date +%s)
          ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          PAYLOAD="{\"id\":\"$ID\",\"param\":\"qsensors\",\"unix_seconds\":$TIMESTAMP}"
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')
          curl -sf -X POST https://webhook.erdferkel.eu/ \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"